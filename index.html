<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PayPulse — Get paid faster. Automatically.</title>
<meta name="description" content="PayPulse uses AI to chase your unpaid invoices for you — smart, on-brand reminders that escalate automatically until you get paid." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0B0D; --ink-soft:#101216; --ink-line:#1E2024;
    --paper:#FAFAF8; --paper-soft:#F1F1EE; --paper-line:#E4E4E0;
    --pulse:#00E5A0; --pulse-dim:#00B381; --pulse-glow:#5FFFC8;
    --ember:#FF6B4A; --amber:#FBBF24;
    --bg:var(--ink); --bg-soft:var(--ink-soft); --line:var(--ink-line);
    --text:#ffffff; --text-60:rgba(255,255,255,.62); --text-45:rgba(255,255,255,.45);
    --text-35:rgba(255,255,255,.35); --text-25:rgba(255,255,255,.22);
    --grid-line:rgba(255,255,255,.05); --card-bg:rgba(255,255,255,.025);
    --header-bg:rgba(10,11,13,.72); --scrollbar:#2a2d33; --hover-tint:rgba(255,255,255,.045);
  }
  html.light{
    --bg:var(--paper); --bg-soft:var(--paper-soft); --line:var(--paper-line);
    --text:#0A0B0D; --text-60:rgba(10,11,13,.62); --text-45:rgba(10,11,13,.48);
    --text-35:rgba(10,11,13,.38); --text-25:rgba(10,11,13,.22);
    --grid-line:rgba(0,0,0,.045); --card-bg:rgba(0,0,0,.018);
    --header-bg:rgba(250,250,248,.78); --scrollbar:#d8d8d4; --hover-tint:rgba(0,0,0,.035);
  }
  *,*::before,*::after{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; transition:background .35s ease,color .35s ease;
    overflow-x:hidden;
  }
  ::selection{ background:#00E5A0; color:#0A0B0D; }
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar); border-radius:99px;}
  a{color:inherit; text-decoration:none;}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer;}
  :focus-visible{outline:2px solid var(--pulse); outline-offset:3px; border-radius:4px;}
  img,svg{display:block;}
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; }
  .container{ width:100%; max-width:1180px; margin:0 auto; padding:0 24px; }
  @media(min-width:1024px){ .container{ padding:0 48px; } }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--pulse); }
  .grid-bg{ background-image:linear-gradient(to right, var(--grid-line) 1px, transparent 1px), linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px); background-size:56px 56px; }
  .text-balance{ text-wrap:balance; }

  /* ---------- Buttons ---------- */
  .btn{ position:relative; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-weight:500; border-radius:999px; white-space:nowrap; cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, background-color .25s ease, border-color .25s ease; user-select:none; }
  .btn:active{ transform:scale(.97); }
  .btn-lg{ padding:14px 28px; font-size:15px; }
  .btn-md{ padding:10px 20px; font-size:14px; }
  .btn-primary{ background:var(--pulse); color:#0A0B0D; }
  .btn-primary:hover{ background:var(--pulse-glow); transform:scale(1.035); box-shadow:0 0 28px 4px rgba(0,229,160,.35); }
  .btn-secondary{ background:var(--card-bg); color:var(--text); border:1px solid var(--line); }
  .btn-secondary:hover{ border-color:var(--text-35); transform:scale(1.02); }
  .btn-full{ width:100%; }
  .icon{ width:16px; height:16px; flex:none; }

  /* ---------- Header ---------- */
  header{ position:fixed; inset:0 0 auto 0; z-index:50; border-bottom:1px solid transparent; transition:all .3s ease; }
  header.scrolled{ background:var(--header-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom-color:var(--line); }
  .nav-row{ height:64px; display:flex; align-items:center; justify-content:space-between; }
  .logo{ display:flex; align-items:center; gap:8px; }
  .logo-dot{ position:relative; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
  .logo-dot span{ position:absolute; width:8px; height:8px; border-radius:99px; background:var(--pulse); }
  .logo-dot span.ping{ animation:ping 2s cubic-bezier(0,0,.2,1) infinite; opacity:.6; }
  @keyframes ping{ 75%,100%{ transform:scale(2.4); opacity:0; } }
  .logo-text{ font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:500; letter-spacing:-.02em; }
  nav.desktop-nav{ display:none; align-items:center; gap:32px; }
  nav.desktop-nav a{ font-size:14px; color:var(--text-60); transition:color .2s; }
  nav.desktop-nav a:hover{ color:var(--text); }
  .header-right{ display:none; align-items:center; gap:4px; }
  @media(min-width:768px){ nav.desktop-nav, .header-right{ display:flex; } .mobile-toggle{ display:none !important; } }
  .icon-btn{ width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:99px; transition:background .2s; color:var(--text-60); }
  .icon-btn:hover{ background:var(--hover-tint); }
  .lang-wrap{ position:relative; }
  .lang-btn{ display:flex; align-items:center; gap:6px; border-radius:99px; padding:8px 12px; font-size:14px; color:var(--text-60); transition:background .2s; }
  .lang-btn:hover{ background:var(--hover-tint); }
  .lang-menu{ position:absolute; right:0; top:calc(100% + 8px); width:150px; background:var(--bg-soft); border:1px solid var(--line); border-radius:14px; padding:4px; box-shadow:0 20px 50px -10px rgba(0,0,0,.4); backdrop-filter:blur(20px); opacity:0; visibility:hidden; transform:translateY(-6px) scale(.97); transition:all .16s ease; }
  .lang-menu.open{ opacity:1; visibility:visible; transform:translateY(0) scale(1); }
  .lang-item{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-radius:8px; font-size:14px; text-align:left; transition:background .15s; }
  .lang-item:hover{ background:var(--hover-tint); }
  .lang-item svg{ width:14px; height:14px; color:var(--pulse); opacity:0; }
  .lang-item.active svg{ opacity:1; }
  .login-link{ margin-left:6px; padding:8px 12px; font-size:14px; color:var(--text-60); transition:color .2s; }
  .login-link:hover{ color:var(--text); }
  .mobile-toggle{ width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .mobile-menu{ overflow:hidden; max-height:0; border-bottom:1px solid transparent; background:var(--header-bg); backdrop-filter:blur(20px); transition:max-height .3s ease, border-color .3s; }
  .mobile-menu.open{ max-height:420px; border-bottom-color:var(--line); }
  .mobile-menu-inner{ padding:8px 24px 20px; display:flex; flex-direction:column; gap:2px; }
  .mobile-menu-inner a{ padding:10px 0; font-size:14px; color:var(--text-60); }
  .mobile-row{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); padding-top:12px; margin-top:8px; }

  /* ---------- Reveal / Stagger ---------- */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .65s cubic-bezier(.21,.47,.32,.98), transform .65s cubic-bezier(.21,.47,.32,.98); }
  .reveal.in-view{ opacity:1; transform:translateY(0); }
  .reveal.d1{ transition-delay:.06s; } .reveal.d2{ transition-delay:.12s; } .reveal.d3{ transition-delay:.18s; }
  .stagger-item{ opacity:0; transform:translateY(26px); transition:opacity .55s cubic-bezier(.21,.47,.32,.98), transform .55s cubic-bezier(.21,.47,.32,.98); }
  .stagger-group.in-view .stagger-item:nth-child(1){ transition-delay:.05s; }
  .stagger-group.in-view .stagger-item:nth-child(2){ transition-delay:.15s; }
  .stagger-group.in-view .stagger-item:nth-child(3){ transition-delay:.25s; }
  .stagger-group.in-view .stagger-item:nth-child(4){ transition-delay:.35s; }
  .stagger-group.in-view .stagger-item{ opacity:1; transform:translateY(0); }

  /* ---------- Pulse line ---------- */
  .pulse-svg path{ stroke-dasharray:1300; stroke-dashoffset:1300; transition:stroke-dashoffset 2.2s cubic-bezier(.21,.47,.32,.98), opacity .4s; opacity:0; }
  .pulse-svg.in-view path{ stroke-dashoffset:0; opacity:1; }

  /* ---------- Hero ---------- */
  #hero{ position:relative; padding:168px 0 96px; overflow:hidden; }
  .hero-glow{ position:absolute; inset:0; z-index:-1; pointer-events:none; }
  .hero-glow .blob1{ position:absolute; left:50%; top:-10%; width:780px; height:480px; transform:translateX(-50%); border-radius:99px; background:rgba(0,229,160,.13); filter:blur(120px); }
  .hero-glow .blob2{ position:absolute; right:8%; top:18%; width:280px; height:280px; border-radius:99px; background:rgba(255,107,74,.07); filter:blur(100px); }
  .hero-pulse-bg{ position:absolute; left:0; right:0; top:56%; height:96px; z-index:-1; opacity:.32; }
  .hero-inner{ display:flex; flex-direction:column; align-items:center; text-align:center; }
  .hero-badge{ display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); background:var(--card-bg); padding:7px 16px; border-radius:99px; margin-bottom:26px; backdrop-filter:blur(6px); }
  .hero-badge .dot{ width:6px; height:6px; border-radius:99px; background:var(--pulse); }
  h1.hero-title{ max-width:880px; font-size:clamp(2.6rem,6vw,4.6rem); font-weight:650; line-height:1.06; letter-spacing:-.04em; }
  .reveal-line{ display:block; overflow:hidden; }
  .reveal-line span{ display:block; transform:translateY(110%); opacity:0; transition:transform .8s cubic-bezier(.21,.47,.32,.98), opacity .8s ease; }
  .reveal-line.in-view span{ transform:translateY(0); opacity:1; }
  .reveal-line.muted{ color:var(--text-35); }
  .reveal-line.line2{ transition-delay:.1s; }
  .hero-sub{ margin-top:28px; max-width:560px; font-size:18px; color:var(--text-60); }
  .hero-ctas{ margin-top:36px; display:flex; flex-direction:column; gap:12px; align-items:center; }
  @media(min-width:640px){ .hero-ctas{ flex-direction:row; } }
  .hero-proof{ margin-top:64px; width:100%; }
  .proof-label{ margin-bottom:24px; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--text-35); }
  .stats-row{ max-width:480px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:24px; border-top:1px solid var(--line); padding-top:24px; }
  .stat-value{ font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; letter-spacing:-.03em; }
  .stat-label{ margin-top:4px; font-size:11px; line-height:1.3; color:var(--text-45); }

  /* ---------- Dashboard preview ---------- */
  .dash-wrap{ position:relative; max-width:760px; margin:80px auto 0; opacity:0; transform:translateY(40px); transition:opacity .9s ease, transform .9s cubic-bezier(.21,.47,.32,.98); }
  .dash-wrap.in-view{ opacity:1; transform:translateY(0); }
  .dash-glow{ position:absolute; inset:-40px; z-index:-1; border-radius:40px; background:rgba(0,229,160,.1); filter:blur(60px); }
  .dash-card{ overflow:hidden; border-radius:20px; border:1px solid var(--line); background:var(--bg-soft); box-shadow:0 30px 80px -20px rgba(0,0,0,.4); backdrop-filter:blur(20px); }
  .dash-chrome{ display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); padding:12px 16px; }
  .dash-chrome span.d{ width:10px; height:10px; border-radius:99px; }
  .dash-chrome .url{ margin-left:8px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-35); }
  .dash-grid{ display:grid; grid-template-columns:1.3fr 1fr; }
  @media(max-width:640px){ .dash-grid{ grid-template-columns:1fr; } }
  .dash-col{ padding:20px; background:var(--bg-soft); }
  .dash-col + .dash-col{ border-left:1px solid var(--line); }
  @media(max-width:640px){ .dash-col + .dash-col{ border-left:none; border-top:1px solid var(--line); } }
  .dash-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .dash-head h3{ font-size:14px; font-weight:500; }
  .dash-head p{ font-size:12px; color:var(--text-45); margin-top:2px; }
  .live-badge{ display:flex; align-items:center; gap:6px; border-radius:99px; background:rgba(0,229,160,.1); padding:4px 10px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--pulse); }
  .live-dot{ width:6px; height:6px; border-radius:99px; background:var(--pulse); animation:pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  .row-head{ display:grid; grid-template-columns:1.4fr .8fr .8fr .7fr; gap:8px; padding:0 8px 8px; font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-25); }
  .inv-row{ display:grid; grid-template-columns:1.4fr .8fr .8fr .7fr; align-items:center; gap:8px; padding:9px 8px; border-radius:10px; font-size:12px; transition:background .2s; }
  .inv-row:hover{ background:var(--hover-tint); }
  .inv-row .name{ font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .inv-row .amt{ font-family:'JetBrains Mono',monospace; color:var(--text-60); }
  .badge{ display:inline-block; padding:2px 9px; border-radius:99px; font-size:10px; font-weight:500; }
  .badge.paid{ background:rgba(0,229,160,.15); color:var(--pulse); }
  .badge.pending{ background:rgba(251,191,36,.15); color:var(--amber); }
  .badge.overdue{ background:rgba(255,107,74,.15); color:var(--ember); }
  .inv-row .last{ text-align:right; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-35); }
  .dash-stat-top{ display:flex; align-items:center; justify-content:space-between; }
  .dash-stat-top span.label{ font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-45); }
  .dash-stat-top span.delta{ display:flex; align-items:center; gap:2px; font-size:10px; font-weight:500; color:var(--pulse); }
  .dash-stat-value{ margin-top:6px; font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:600; letter-spacing:-.03em; }
  .dash-stat-value sup{ font-size:17px; color:var(--text-45); font-weight:400; }
  .dash-chart{ height:64px; margin:16px 0; }
  .dash-footer{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); padding-top:12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-45); }
  .dash-footer .ld{ width:6px; height:6px; border-radius:99px; background:var(--pulse); }

  /* ---------- Generic section ---------- */
  section{ position:relative; padding:96px 0; }
  section.bordered{ border-top:1px solid var(--line); }
  @media(min-width:640px){ section{ padding:128px 0; } }
  h2.section-title{ margin-top:16px; max-width:680px; font-size:clamp(1.9rem,3.4vw,2.85rem); font-weight:650; line-height:1.15; letter-spacing:-.025em; }
  p.section-sub{ margin-top:16px; max-width:560px; color:var(--text-60); }
  .center{ text-align:center; margin-left:auto; margin-right:auto; }

  /* ---------- Cards grid ---------- */
  .card{ height:100%; border-radius:18px; border:1px solid var(--line); background:var(--card-bg); padding:28px; transition:transform .3s ease, border-color .3s ease, box-shadow .3s ease; }
  .card:hover{ transform:translateY(-5px); border-color:var(--text-25); box-shadow:0 24px 50px -22px rgba(0,0,0,.3); }
  .card-icon{ width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:12px; background:rgba(0,229,160,.1); color:var(--pulse); transition:transform .3s; }
  .card:hover .card-icon{ transform:scale(1.1); }
  .card-icon.ember{ background:rgba(255,107,74,.1); color:var(--ember); }
  .card h3{ margin-top:18px; font-size:15px; font-weight:500; }
  .card p{ margin-top:10px; font-size:14px; line-height:1.6; color:var(--text-60); }
  .cards-3{ margin-top:48px; display:grid; gap:18px; grid-template-columns:1fr; }
  @media(min-width:768px){ .cards-3{ grid-template-columns:repeat(3,1fr); } }
  .cards-2{ margin-top:52px; display:grid; gap:18px; grid-template-columns:1fr; }
  @media(min-width:640px){ .cards-2{ grid-template-columns:repeat(2,1fr); } }

  /* ---------- Solution ---------- */
  .solution-grid{ display:grid; gap:60px; grid-template-columns:1fr; align-items:center; }
  @media(min-width:1024px){ .solution-grid{ grid-template-columns:1fr 1fr; } }
  .point-row{ display:flex; gap:16px; margin-top:28px; }
  .point-icon{ width:36px; height:36px; flex:none; display:flex; align-items:center; justify-content:center; border-radius:99px; background:rgba(0,229,160,.1); color:var(--pulse); }
  .point-row h3{ font-size:15px; font-weight:500; }
  .point-row p{ margin-top:6px; font-size:14px; line-height:1.6; color:var(--text-60); }
  .panel{ border-radius:18px; border:1px solid var(--line); background:var(--card-bg); padding:24px; margin-bottom:16px; }
  .panel.active{ border-color:rgba(0,229,160,.35); background:rgba(0,229,160,.06); box-shadow:0 0 60px -20px rgba(0,229,160,.35); }
  .panel-top{ display:flex; align-items:center; justify-content:space-between; }
  .panel-top .lbl{ font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-45); }
  .panel.active .lbl{ color:var(--pulse); }
  .panel-dot{ width:6px; height:6px; border-radius:99px; background:var(--ember); opacity:.7; }
  .panel.active .panel-dot{ background:var(--pulse); opacity:1; animation:pulseDot 1.6s ease-in-out infinite; }
  .panel-chart{ height:64px; margin-top:14px; opacity:.75; }
  .panel.active .panel-chart{ opacity:1; }

  /* ---------- How it works ---------- */
  .steps-wrap{ position:relative; margin-top:64px; display:grid; gap:40px; grid-template-columns:1fr; }
  @media(min-width:768px){ .steps-wrap{ grid-template-columns:repeat(3,1fr); gap:24px; } }
  .step-line{ display:none; position:absolute; left:0; right:0; top:24px; height:1px; background:linear-gradient(to right, transparent, var(--line), transparent); }
  @media(min-width:768px){ .step-line{ display:block; } }
  .step-top{ display:flex; align-items:center; gap:12px; }
  .step-num{ position:relative; z-index:1; width:48px; height:48px; flex:none; display:flex; align-items:center; justify-content:center; border-radius:99px; border:1px solid var(--line); background:var(--bg); font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--pulse); }
  .step-rule{ flex:1; height:1px; background:var(--line); }
  @media(min-width:768px){ .step-rule{ display:none; } }
  .step-card h3{ margin-top:20px; font-size:17px; font-weight:500; }
  .step-card p{ margin-top:8px; font-size:14px; line-height:1.6; color:var(--text-60); }

  /* ---------- Tones ---------- */
  .tones-title{ text-align:center; font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.18em; color:var(--text-45); }
  .tones-grid{ margin-top:32px; display:grid; gap:18px; grid-template-columns:1fr; }
  @media(min-width:768px){ .tones-grid{ grid-template-columns:repeat(3,1fr); } }
  .tone-card{ position:relative; height:100%; overflow:hidden; border-radius:18px; border:1px solid var(--line); background:var(--card-bg); padding:24px 24px 24px 26px; }
  .tone-bar{ position:absolute; left:0; top:0; height:100%; width:3px; }
  .tone-bar.soft{ background:var(--pulse); }
  .tone-bar.normal{ background:var(--amber); }
  .tone-bar.firm{ background:var(--ember); }
  .tone-head{ display:flex; align-items:center; gap:8px; color:var(--text-45); }
  .tone-head span{ font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.06em; }
  .tone-card p{ margin-top:16px; font-size:14px; line-height:1.6; color:var(--text-60); }

  /* ---------- Pricing ---------- */
  .pricing-grid{ margin-top:64px; display:grid; gap:24px; grid-template-columns:1fr; align-items:end; }
  @media(min-width:1024px){ .pricing-grid{ grid-template-columns:repeat(3,1fr); } }
  .plan{ position:relative; height:100%; border-radius:18px; border:1px solid var(--line); background:var(--card-bg); padding:32px; transition:transform .3s ease; }
  .plan:hover{ transform:translateY(-6px); }
  .plan.popular{ border-color:rgba(0,229,160,.4); background:rgba(0,229,160,.05); box-shadow:0 30px 70px -30px rgba(0,229,160,.4); }
  @media(min-width:1024px){ .plan.popular{ transform:scale(1.05); } .plan.popular:hover{ transform:scale(1.05) translateY(-6px); } }
  .popular-badge{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--pulse); color:#0A0B0D; padding:4px 12px; border-radius:99px; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
  .plan-name{ font-size:14px; color:var(--text-60); }
  .plan-price{ margin-top:10px; display:flex; align-items:baseline; gap:4px; }
  .plan-price .amt{ font-family:'JetBrains Mono',monospace; font-size:38px; font-weight:600; letter-spacing:-.03em; }

  .plan-feats svg{ width:15px; height:15px; flex:none; margin-top:2px; color:var(--pulse); }

  /* ---------- Final CTA ---------- */
  #finalcta{ overflow:hidden; }
  .finalcta-glow{ position:absolute; left:50%; top:50%; width:820px; height:420px; transform:translate(-50%,-50%); z-index:-1; border-radius:99px; background:rgba(0,229,160,.1); filter:blur(70px); }
  .finalcta-inner{ max-width:620px; margin:0 auto; text-align:center; }
  .finalcta-inner h2{ font-size:clamp(2rem,4.2vw,3rem); font-weight:650; letter-spacing:-.03em; line-height:1.15; }
  .finalcta-inner p{ margin-top:16px; color:var(--text-60); }
  .nocard{ margin-top:16px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-35); }
  .finalcta-line{ max-width:620px; height:80px; margin:64px auto 0; opacity:.5; }

  /* ---------- Footer ---------- */
  footer{ border-top:1px solid var(--line); }
  .footer-grid{ padding:64px 0; display:grid; grid-template-columns:repeat(2,1fr); gap:40px; }
  @media(min-width:768px){ .footer-grid{ grid-template-columns:repeat(5,1fr); } }
  .footer-brand{ grid-column:span 2; }
  .footer-brand p{ margin-top:12px; max-width:280px; font-size:14px; color:var(--text-60); }
  .footer-col h4{ margin-bottom:0; }
  .footer-col ul{ margin-top:16px; display:flex; flex-direction:column; gap:10px; list-style:none; }
  .footer-col a{ font-size:14px; color:var(--text-60); transition:color .2s; }
  .footer-col a:hover{ color:var(--text); }
  .footer-bottom{ display:flex; flex-direction:column; gap:12px; border-top:1px solid var(--line); padding:24px 0; font-size:12px; color:var(--text-25); }
  @media(min-width:640px){ .footer-bottom{ flex-direction:row; align-items:center; justify-content:space-between; } }

  /* ---------- Demo ---------- */
  .demo-grid{ display:grid; gap:24px; grid-template-columns:1fr; margin-top:48px; }
  @media(min-width:900px){ .demo-grid{ grid-template-columns:1fr 1.2fr; } }
  .demo-field{ display:flex; flex-direction:column; gap:6px; margin-top:16px; }
  .demo-field:first-child{ margin-top:0; }
  .demo-field label{ font-size:12px; color:var(--text-45); }
  .demo-field input, .demo-field select{
    padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); font:inherit; font-size:14px;
  }
  .demo-field input:focus, .demo-field select:focus{ border-color:var(--pulse); }
  .demo-output{ display:none; }
  .demo-output.visible{ display:block; }
  .demo-output h4{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-45); font-family:'JetBrains Mono',monospace; margin-top:22px; }
  .demo-output h4:first-child{ margin-top:0; }
  .demo-tabs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .demo-tab{ padding:8px 14px; border-radius:99px; border:1px solid var(--line); background:var(--card-bg); font-size:13px; }
  .demo-tab.active{ background:var(--pulse); color:#0A0B0D; border-color:var(--pulse); }
  .demo-email-body{ margin-top:12px; padding:16px; border-radius:12px; border:1px solid var(--line); background:var(--card-bg); font-size:13px; line-height:1.7; white-space:pre-line; color:var(--text-60); }

  .demo-insight-row{ display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-bottom:1px solid var(--line); color:var(--text-60); }

</style>

let locale = localStorage.getItem('paypulse-locale') || (navigator.language.slice(0,2) === 'fr' ? 'fr' : 'en');

function t(path){
  return path.split('.').reduce((o,k)=> (o && o[k] !== undefined) ? o[k] : null, dict[locale]);
}

function applyLocale(){
  document.documentElement.lang = locale;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const val = t(el.dataset.i18n);
    if (val !== null) el.textContent = val;
  });
  document.getElementById('langCode').textContent = locale;
  document.getElementById('langCodeMobile').textContent = locale;
  document.querySelectorAll('.lang-item').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.locale === locale);
  });
  // pricing feature lists
  document.querySelectorAll('.plan-feats').forEach(ul=>{
    const idx = ul.dataset.plan;
    const feats = t('pricing.plans.' + idx + '.features') || [];
    ul.innerHTML = feats.map(f => '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>' + f + '</li>').join('');
  });
  // footer columns
  document.getElementById('footerProduct').innerHTML = t('footer.links.product').map(x=>'<li><a href="#">'+x+'</a></li>').join('');
  document.getElementById('footerCompany').innerHTML = t('footer.links.company').map(x=>'<li><a href="#">'+x+'</a></li>').join('');
  document.getElementById('footerLegal').innerHTML = t('footer.links.legal').map(x=>'<li><a href="#">'+x+'</a></li>').join('');

  document.title = locale === 'fr' ? "PayPulse — Soyez payé plus vite. Automatiquement." : "PayPulse — Get paid faster. Automatically.";

  // Re-render demo output (if already generated) so it follows the active language
  if (window.__paypulseLastDemoInput) {
    renderDemoOutput(window.__paypulseLastDemoInput);
  }
}

function setLocale(l){
  locale = l;
  localStorage.setItem('paypulse-locale', l);
  applyLocale();
}

}

function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.classList.toggle('light', theme === 'light');
  localStorage.setItem('paypulse-theme', theme);
  applyThemeIcon(theme);
}

/* ====================== Scroll reveal ====================== */
const io = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('in-view');
      io.unobserve(entry.target);
    }
  });
}, { threshold:0.18, rootMargin:'-40px' });

document.querySelectorAll('.reveal, .stagger-group, .pulse-svg, .dash-wrap').forEach(el=> io.observe(el));

/* ====================== Parallax on hero glow ====================== */
const heroGlow = document.getElementById('heroGlow');
const heroSection = document.getElementById('hero');
let ticking = false;
window.addEventListener('scroll', ()=>{
  if(!ticking){
    requestAnimationFrame(()=>{
      const rect = heroSection.getBoundingClientRect();
      const progress = Math.min(Math.max(-rect.top / Math.max(rect.height,1), 0), 1);
      heroGlow.style.transform = 'translateY(' + (progress * 120) + 'px)';
      heroGlow.style.opacity = String(1 - progress * 0.8);
      ticking = false;
    });
    ticking = true;
  }
}, { passive:true });

/* ====================== Interactive Demo ====================== */
function formatAmount(n){
  return new Intl.NumberFormat(locale === 'fr' ? 'fr-FR' : 'en-US').format(n);
}
function formatDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString(locale === 'fr' ? 'fr-FR' : 'en-US', { year:'numeric', month:'short', day:'numeric' });
}
function daysOverdueFrom(dateStr){
  const due = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((today - due) / 86400000);
  return diff; // can be negative if not yet due
}
function riskFromDays(days){
  if (days <= 0) return 'low';
  if (days <= 14) return 'medium';
  return 'high';
}
function oddsFromDays(days){
  if (days <= 0) return 96;
  if (days <= 7) return 90;
  if (days <= 14) return 78;
  if (days <= 30) return 61;
  return 42;
}
function suggestedToneFromDays(days){
  if (days <= 3) return 'soft';
  if (days <= 21) return 'normal';
  return 'firm';
}

function renderDemoOutput(input){
  const d = dict[locale];
  const days = daysOverdueFrom(input.dueDate);
  const daysDisplay = days > 0 ? days : 0;
  const risk = riskFromDays(days);
  const odds = oddsFromDays(days);
  const suggested = suggestedToneFromDays(days);
  const activeTone = input.activeTone || input.tone || suggested;

  document.getElementById('demoEmptyState').style.display = 'none';
  const out = document.getElementById('demoOutput');
  out.classList.add('visible');

  document.getElementById('outClient').textContent = input.client;
  document.getElementById('outAmount').textContent = '€' + formatAmount(input.amount);
  document.getElementById('outDueDate').textContent = formatDate(input.dueDate);
  document.getElementById('outDays').textContent = daysDisplay;

  document.getElementById('outRisk').textContent = d.demo.risk[risk];
  document.getElementById('outOdds').textContent = odds + '%';
  document.getElementById('outSuggested').textContent = d.demo.tones[suggested].label;

  // Tabs
  const tabsEl = document.getElementById('demoTabs');
  tabsEl.innerHTML = '';
  ['soft','normal','firm'].forEach(key=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'demo-tab' + (key === activeTone ? ' active' : '');
    btn.textContent = d.demo.tones[key].label;
    btn.addEventListener('click', ()=>{
      input.activeTone = key;
      renderDemoOutput(input);
    });
    tabsEl.appendChild(btn);
  });

  // Email body
  const toneData = d.demo.tones[activeTone];
  const body = toneData.body
    .replace('{client}', input.client)
    .replace('{amount}', formatAmount(input.amount))
    .replace(/{dueDate}/g, formatDate(input.dueDate))
    .replace(/{days}/g, daysDisplay);
  document.getElementById('demoEmailBody').textContent = body;

  // Timeline
  const tl = d.demo.timelineLabels;
  const items = [
    { label: tl.invoiceAdded, done: true },
    { label: tl.softSent, done: days >= 3 },
    { label: tl.normalSent, done: days >= 14 },
    { label: tl.firmSent, done: days >= 30 },
    { label: tl.nextAction, done: false }
  ];
  document.getElementById('demoTimeline').innerHTML = items.map(item=>
    `<div class="demo-timeline-item${item.done ? ' done' : ''}"><span class="demo-timeline-dot"></span><span>${item.label}</span></div>`
  ).join('');

  window.__paypulseLastDemoInput = input;
}

const demoForm = document.getElementById('demoForm');
if (demoForm) {
  demoForm.addEventListener('submit', (e)=>{
    e.preventDefault();
    const client = document.getElementById('demoClientName').value.trim();
    const amount = parseFloat(document.getElementById('demoAmount').value);
    const dueDate = document.getElementById('demoDueDate').value;
    const tone = document.getElementById('demoTone').value;

    if (!client || !amount || !dueDate) return;

    renderDemoOutput({ client, amount, dueDate, tone, activeTone: tone });

    document.getElementById('demoOutput').scrollIntoView({ behavior:'smooth', block:'nearest' });
  });
}
